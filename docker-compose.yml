services:
  reranklab:
    build:
      context: .
      dockerfile: Dockerfile
    image: reranklab:latest
    container_name: reranklab
    ports:
      - "8080:8080"
    environment:
      RERANKLAB_BIND: 0.0.0.0:8080
      RERANKLAB_SEED: "200"
      RUST_LOG: info,reranklab=debug
    healthcheck:
      test: ["CMD", "/usr/local/bin/reranklab", "--help"]
      interval: 30s
      timeout: 3s
      retries: 3

  prometheus:
    image: prom/prometheus:latest
    container_name: reranklab-prometheus
    profiles: ["monitoring"]
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    depends_on:
      - reranklab
